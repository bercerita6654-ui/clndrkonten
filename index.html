<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kalender Konten Alat Tulis</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'pop-purple': '#8B5CF6',
                        'pop-pink': '#EC4899',
                        'pop-teal': '#14B8A6',
                        'pop-orange': '#F97316',
                        'pop-bg': '#FFF8DB', // Pale Yellow untuk Background
                        'pop-dark': '#1E293B',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            background-color: #FFF8DB;
            color: #1E293B;
        }
        
        .custom-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: rgba(139, 92, 246, 0.3);
            border-radius: 10px;
        }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #8B5CF6; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 172, 223, 0.15); /* Menggunakan Cyan Blue tipis */
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
        }

        .gradient-animate {
            background-size: 200% 200%;
            animation: gradientMove 5s ease infinite;
        }
        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>

<body class="font-sans flex flex-col h-screen overflow-hidden bg-pop-bg text-pop-dark">

    <header class="shrink-0 bg-gradient-to-r from-[#2696E4] via-[#00ACDF] to-[#14B8A6] gradient-animate text-white shadow-lg py-3 md:py-4 px-4 md:px-8 z-20 relative">
        <div class="max-w-[1400px] mx-auto flex justify-between items-center gap-3">
            <div class="flex items-center gap-3">
                <div class="bg-white/20 p-1.5 md:p-2 rounded-xl backdrop-blur-sm">
                    <i data-lucide="calendar-heart" class="w-6 h-6 md:w-7 md:h-7 text-white"></i>
                </div>
                <div>
                    <h1 class="text-lg md:text-xl font-bold tracking-tight text-white drop-shadow-md">Content Planner</h1>
                    <p class="text-[10px] md:text-xs text-white/90 font-medium">Inspirasi Bisnis Alat Tulis & Sekolah</p>
                </div>
            </div>
            <button onclick="goToToday()" class="bg-[#FFEA86] text-[#2696E4] hover:bg-white px-4 py-1.5 md:px-5 md:py-2.5 rounded-full font-bold text-[10px] md:text-xs transition-all shadow-md hover:shadow-lg flex items-center gap-2 group">
                <i data-lucide="calendar-check" class="w-3.5 h-3.5 md:w-4 md:h-4 group-hover:scale-110 transition-transform"></i> Hari Ini
            </button>
        </div>
    </header>

    <main class="flex-1 w-full max-w-[1400px] mx-auto p-3 md:p-5 flex flex-col lg:flex-row gap-4 md:gap-6 overflow-hidden relative z-10">
        
        <section class="flex-1 flex flex-col h-full overflow-hidden">
            <div class="glass-panel rounded-3xl p-3 md:p-5 flex flex-col h-full overflow-hidden">
                
                <div class="shrink-0 flex justify-between items-center mb-3 md:mb-4 px-2">
                    <button onclick="changeMonth(-1)" class="p-2 rounded-full bg-[#D4F6FF]/50 text-[#2696E4] hover:bg-[#2696E4] hover:text-white transition-all shadow-sm">
                        <i data-lucide="chevron-left" class="w-5 h-5"></i>
                    </button>
                    <h2 id="monthYearDisplay" class="text-lg md:text-2xl font-extrabold text-[#2696E4] text-center">Bulan Tahun</h2>
                    <button onclick="changeMonth(1)" class="p-2 rounded-full bg-[#D4F6FF]/50 text-[#2696E4] hover:bg-[#2696E4] hover:text-white transition-all shadow-sm">
                        <i data-lucide="chevron-right" class="w-5 h-5"></i>
                    </button>
                </div>

                <div class="shrink-0 grid grid-cols-7 gap-1 md:gap-3 mb-2 text-center font-bold text-pop-dark/60 text-[9px] md:text-xs uppercase tracking-wider">
                    <div class="text-pop-pink">Min</div><div>Sen</div><div>Sel</div><div>Rab</div><div>Kam</div><div>Jum</div><div class="text-[#2696E4]">Sab</div>
                </div>

                <!-- Inner scroll kalender -->
                <div class="flex-1 overflow-y-auto custom-scroll pr-1 md:pr-2">
                    <div id="calendarGrid" class="grid grid-cols-7 gap-1 md:gap-3 pb-2">
                        <!-- Render JS -->
                    </div>
                </div>

                <!-- Footer Legend -->
                <div class="shrink-0 mt-3 pt-3 border-t border-gray-100 hidden md:block">
                    <h3 class="text-xs font-bold text-pop-dark mb-2 flex items-center gap-2">
                        <i data-lucide="filter" class="w-3.5 h-3.5 text-[#2696E4]"></i> Daftar Event:
                    </h3>
                    <div class="flex flex-wrap gap-2">
                        <button onclick="openModal('holiday')" class="flex items-center gap-1.5 px-2.5 py-1 rounded-xl bg-white border border-pop-pink/30 text-pop-pink hover:bg-pop-pink hover:text-white hover:shadow-md transition-all text-[10px] md:text-xs font-semibold cursor-pointer">
                            <span class="w-2 h-2 rounded-full bg-pop-pink"></span> Libur Nasional
                        </button>
                        <button onclick="openModal('school')" class="flex items-center gap-1.5 px-2.5 py-1 rounded-xl bg-white border border-pop-teal/30 text-pop-teal hover:bg-pop-teal hover:text-white hover:shadow-md transition-all text-[10px] md:text-xs font-semibold cursor-pointer">
                            <span class="w-2 h-2 rounded-full bg-pop-teal"></span> Momen Sekolah
                        </button>
                        <button onclick="openModal('promo')" class="flex items-center gap-1.5 px-2.5 py-1 rounded-xl bg-white border border-pop-orange/30 text-pop-orange hover:bg-pop-orange hover:text-white hover:shadow-md transition-all text-[10px] md:text-xs font-semibold cursor-pointer">
                            <span class="w-2 h-2 rounded-full bg-pop-orange"></span> Promo Kembar
                        </button>
                        <button onclick="openModal('regional')" class="flex items-center gap-1.5 px-2.5 py-1 rounded-xl bg-white border border-pop-purple/30 text-pop-purple hover:bg-pop-purple hover:text-white hover:shadow-md transition-all text-[10px] md:text-xs font-semibold cursor-pointer">
                            <i data-lucide="map-pin" class="w-3 h-3"></i> Lokal Bali
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <section class="w-full lg:w-[450px] xl:w-[480px] flex flex-col h-full shrink-0 overflow-hidden">
            <div id="detailsPanel" class="glass-panel rounded-3xl p-4 md:p-5 flex flex-col h-full overflow-hidden">
                <!-- Render JS -->
            </div>
        </section>
    </main>

    <div id="eventModal" class="fixed inset-0 bg-pop-dark/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 opacity-0 pointer-events-none transition-opacity duration-300">
        <div class="bg-white rounded-3xl w-full max-w-lg overflow-hidden shadow-2xl transform scale-95 transition-transform duration-300 border border-white/20" id="modalContentBox">
            <div class="bg-gradient-to-r from-[#2696E4] to-[#00ACDF] p-4 flex justify-between items-center text-white">
                <h3 id="modalTitle" class="font-bold text-base flex items-center gap-2">Daftar Event</h3>
                <button onclick="closeModal()" class="text-white/80 hover:text-white hover:rotate-90 transition-all bg-white/10 p-1.5 rounded-full">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
            <div class="p-3 max-h-[60vh] overflow-y-auto bg-pop-bg/50" id="modalBody">
                <!-- Render JS -->
            </div>
        </div>
    </div>

    <script>
        const holidayData = [
            { month: 0, date: 1, name: "Tahun Baru Masehi", type: "holiday" },
            { month: 1, date: 17, name: "Isra Mikraj", type: "holiday" },
            { month: 1, date: 17, name: "Tahun Baru Imlek", type: "holiday" },
            { month: 2, date: 19, name: "Nyepi (Tahun Baru Saka)", type: "holiday" },
            { month: 2, date: 21, name: "Idul Fitri 1447 H", type: "holiday" },
            { month: 2, date: 22, name: "Idul Fitri 1447 H", type: "holiday" },
            { month: 3, date: 3, name: "Wafat Yesus Kristus", type: "holiday" },
            { month: 4, date: 1, name: "Hari Buruh Internasional", type: "holiday" },
            { month: 4, date: 14, name: "Kenaikan Yesus Kristus", type: "holiday" },
            { month: 4, date: 27, name: "Idul Adha 1447 H", type: "holiday" },
            { month: 4, date: 31, name: "Hari Raya Waisak", type: "holiday" },
            { month: 5, date: 1, name: "Hari Lahir Pancasila", type: "holiday" },
            { month: 7, date: 17, name: "HUT Kemerdekaan RI", type: "holiday" },
            { month: 11, date: 25, name: "Hari Raya Natal", type: "holiday" }
        ];

        const schoolMoments = [
            { month: 0, date: 5, name: "Awal Semester Genap", type: "school" },
            { month: 4, date: 2, name: "Hari Pendidikan Nasional", type: "school" },
            { month: 6, date: 13, name: "Tahun Ajaran Baru (BTS)", type: "school" },
            { month: 10, date: 25, name: "Hari Guru Nasional", type: "school" }
        ];

        const promoData = [];
        for (let i = 0; i < 12; i++) {
            promoData.push({ month: i, date: i + 1, name: `Promo Puncak ${i + 1}.${i + 1}`, type: "promo" });
        }

        const regionalMoments = [
            { month: 3, date: 4, name: "Saraswati", type: "regional" },
            { month: 3, date: 8, name: "Pagerwesi", type: "regional" },
            { month: 5, date: 17, name: "Galungan", type: "regional" },
            { month: 5, date: 27, name: "Kuningan", type: "regional" },
            { month: 9, date: 31, name: "Saraswati", type: "regional" }
        ];

        const allEvents = [...holidayData, ...schoolMoments, ...promoData, ...regionalMoments];

        let currentAR = "4:5";
        let currentStyle = "fotografi produk estetik dan tajam";

        window.updatePromptSettings = function() {
            currentAR = document.getElementById('arSelect').value;
            currentStyle = document.getElementById('styleSelect').value;
            renderDetails();
            lucide.createIcons();
        }

        const generateContentIdea = (event) => {
            if (event.type === 'promo') {
                return {
                    topic: `Campaign Mega Sale ${event.name}`,
                    format: "Poster Promo / Live Shopping",
                    description: `Fokus dorong penjualan! Siapkan 'Paket Bundling', Flash Sale buku & pulpen, ingatkan klaim voucher Gratis Ongkir.`,
                    hashtags: `#PromoATK #DiskonAlatTulis #Promo${event.date}${event.month+1}`,
                    basePrompt: `visual e-commerce 3D yang cerah untuk promosi alat tulis, buku catatan dan pulpen estetik yang melayang, teks neon bercahaya bertuliskan "DISKON BESAR", sangat memukau.`
                };
            }

            const ideas = {
                "Tahun Baru Masehi": {
                    topic: "Resolusi & Perencanaan Baru",
                    format: "Reels / Carousel",
                    description: "Tunjukkan koleksi planner dan pulpen premium untuk memulai tahun dengan rapi.",
                    hashtags: "#TahunBaru #Resolusi2026 #PlannerAddict",
                    basePrompt: `tata letak datar (flat lay) buku planner 2026 modern yang kosong di atas meja cerah, dikelilingi pulpen premium, pencahayaan lembut.`
                },
                "Nyepi (Tahun Baru Saka)": {
                   topic: "Ketenangan & Menulis Reflektif",
                   format: "Quote Graphic",
                   description: "Quote tentang ketenangan. Promosikan buku jurnal kosong untuk self-reflection.",
                   hashtags: "#Nyepi #Journaling #Mindfulness",
                   basePrompt: `ruang kerja minimalis dan tenang, satu buku jurnal kosong elegan dan pulpen ramping di atas meja rapi, suasana hening dan damai.`
                },
                "Idul Fitri 1447 H": {
                    topic: "Hampers Lebaran & Kartu Ucapan",
                    format: "Video Tutorial / Poster",
                    description: "Tutorial bikin kartu ucapan DIY pakai spidol kaligrafi. Tawarkan 'Hampers ATK Estetik'.",
                    hashtags: "#IdulFitri #Lebaran #HampersLebaran #KartuUcapan",
                    basePrompt: `kartu ucapan lebaran buatan tangan dengan kaligrafi indah, dikelilingi alat tulis, spidol, dan kotak hadiah hampers rapi.`
                },
                "Idul Adha 1447 H": {
                    topic: "Semangat Berkurban & Berbagi",
                    format: "Quote Graphic",
                    description: "Ide berbagi donasi alat tulis ke panti asuhan, atau diskon khusus 'Berkah Idul Adha'.",
                    hashtags: "#IdulAdha #BerbagiKebaikan #AlatTulis",
                    basePrompt: `komposisi menyentuh dari kotak hadiah donasi berisi alat tulis, dibungkus rapi dengan pita, suasana hangat dan dermawan.`
                },
                "HUT Kemerdekaan RI": {
                    topic: "Semangat Merah Putih & Lomba Gambar",
                    format: "Giveaway / Poster",
                    description: "Promosi alat lukis/gambar untuk persiapan lomba 17-an anak sekolah.",
                    hashtags: "#HUTRI #17Agustus #LombaGambar",
                    basePrompt: `tata letak alat seni kreatif, pensil warna dan cat yang disusun dinamis, estetika kebanggaan nasional Indonesia yang cerah.`
                },
                "Tahun Ajaran Baru (BTS)": {
                    topic: "Persiapan Back to School",
                    format: "Poster Promosi Besar",
                    description: "Video unboxing tas sekolah dan bundle alat tulis lengkap per jenjang.",
                    hashtags: "#BackToSchool #TahunAjaranBaru #PromoSekolah",
                    basePrompt: `tas ransel sekolah yang trendi terbuka dengan alat tulis berwarna-warni berhamburan keluar secara estetik dan ceria.`
                },
                "Saraswati": {
                    topic: "Hari Turunnya Ilmu Pengetahuan",
                    format: "Quote Graphic / Promo",
                    description: "Tawarkan diskon khusus untuk pelajar (buku tulis, alat lukis, kaligrafi).",
                    hashtags: "#Saraswati #HariRayaSaraswati #IlmuPengetahuan",
                    basePrompt: `susunan estetik buku-buku tebal dan alat tulis modern diletakkan bersebelahan dengan lontar tradisional bali, perayaan ilmu pengetahuan yang damai.`
                }
            };

            const defaultIdea = {
                topic: `Momen Spesial: ${event.name}`,
                format: "Photo Post / Story",
                description: `Manfaatkan momen ${event.name} untuk menyapa pelanggan dan mempromosikan produk relevan.`,
                hashtags: "#Stationery #AlatTulisKantor",
                basePrompt: `susunan berbagai produk alat tulis modern yang indah, buku catatan dan pulpen, pencahayaan kreatif, fotografi produk berkualitas tinggi.`
            };

            return ideas[event.name] || defaultIdea;
        };

        const dailyIdeas = [
            { dayName: "Minggu", topic: "Relax & Journaling", format: "Aesthetic Photo", description: "Ide journaling untuk self-care atau persiapan alat tulis untuk besok.", hashtags: "#SundayVibes #JournalingIdeas", basePrompt: `buku bullet journal estetik yang terbuka dengan coretan kreatif, dikelilingi selimut lembut dan pulpen, suasana pagi hari minggu yang santai.` },
            { dayName: "Senin", topic: "Monday Motivation", format: "Poster Motivasi", description: "Bagikan quote motivasi. Promosikan buku agenda, planner, atau sticky notes.", hashtags: "#MondayMotivation #PlannerAddict", basePrompt: `ruang kerja cerah dan inspiratif, buku agenda mingguan terbuka, sticky notes tertempel rapi di area kerja, suasana produktif.` },
            { dayName: "Selasa", topic: "Tips & Edukasi", format: "Infografis", description: "Tips alat tulis: 'Beda pulpen gel vs ballpoint', atau 'Tips studygram estetik'.", hashtags: "#TipsATK #StudygramIndonesia", basePrompt: `tampilan jarak dekat makro yang menunjukkan ujung pulpen saat menulis garis di atas kertas bertekstur premium.` },
            { dayName: "Rabu", topic: "Product Spotlight", format: "Review Poster", description: "Fokus pada satu produk (swatches spidol, ketebalan kertas).", hashtags: "#ReviewAlatTulis #RekomendasiATK", basePrompt: `kertas tebal berisi coretan contoh warna warni (swatches) dari spidol kuas, spidol diletakkan rapi di sebelahnya, fokus produk.` },
            { dayName: "Kamis", topic: "Interaksi / Games", format: "Polling Story", description: "Game 'This or That' (Pulpen Biru vs Hitam, Buku Garis vs Polos).", hashtags: "#StationeryAddict #Interaksi", basePrompt: `komposisi layar terbelah menampilkan pulpen elegan di sebelah kiri dan pulpen kontras di sebelah kanan.` },
            { dayName: "Jumat", topic: "Flash Sale Akhir Pekan", format: "Poster Promosi", description: "Promosikan Paket Hemat Sekolah, atau promo Jumat Berkah.", hashtags: "#PromoATK #FlashSale #PaketHemat", basePrompt: `tumpukan perlengkapan alat tulis yang dibungkus cantik diikat dengan pita, penataan estetik untuk gambar promosi.` },
            { dayName: "Sabtu", topic: "Behind the Scenes", format: "Photo Post", description: "Tunjukkan proses packing pesanan yang rapi (ASMR vibes).", hashtags: "#SmallBusiness #PackingOrders", basePrompt: `suasana estetik bisnis kecil, seseorang membungkus produk alat tulis dengan rapi menggunakan kertas ramah lingkungan di atas meja kayu.` }
        ];

        const MONTHS = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
        let currentDate = new Date();
        let selectedDate = currentDate.getDate();

        function initCalendar() {
            renderCalendar();
            renderDetails();
            lucide.createIcons();
        }

        function changeMonth(offset) {
            currentDate.setMonth(currentDate.getMonth() + offset);
            selectedDate = null; 
            renderCalendar();
            renderDetails();
            lucide.createIcons();
        }

        function goToToday() {
            currentDate = new Date(); 
            selectedDate = currentDate.getDate(); 
            renderCalendar();
            renderDetails();
            lucide.createIcons();
            
            setTimeout(() => {
                const innerCalendar = document.querySelector('.custom-scroll');
                innerCalendar.scrollTop = 0;
            }, 100);
        }

        function selectDate(day) {
            selectedDate = day;
            renderCalendar();
            renderDetails();
            lucide.createIcons();
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            
            document.getElementById('monthYearDisplay').innerText = `${MONTHS[month]} ${year}`;
            
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            for (let i = 0; i < firstDay; i++) {
                const emptyDiv = document.createElement('div');
                emptyDiv.className = 'p-1.5 min-h-[75px] bg-white/40 rounded-xl opacity-40 border border-dashed border-[#D4F6FF]';
                grid.appendChild(emptyDiv);
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dayDate = new Date(year, month, day);
                const dayOfWeek = dayDate.getDay();
                
                const eventsToday = allEvents.filter(e => e.month === month && e.date === day);
                const isSelected = selectedDate === day;
                const isToday = day === new Date().getDate() && month === new Date().getMonth() && year === new Date().getFullYear();

                let styleClasses = "p-1.5 md:p-2 min-h-[85px] md:min-h-[90px] rounded-xl relative cursor-pointer transition-all duration-300 flex flex-col items-start group overflow-hidden ";
                
                if (isSelected) {
                    styleClasses += "bg-[#2696E4] text-white shadow-lg shadow-[#2696E4]/40 transform scale-[1.03] z-10 ring-2 ring-[#FFEA86] ring-offset-2 ring-offset-[#FFF8DB] ";
                } else if (isToday) {
                    styleClasses += "bg-[#D4F6FF]/60 border-2 border-[#00ACDF] hover:bg-[#D4F6FF] ";
                } else {
                    styleClasses += "bg-white border border-[#D4F6FF]/50 hover:border-[#00ACDF]/40 hover:shadow-md hover:-translate-y-0.5 ";
                }

                const dayDiv = document.createElement('div');
                dayDiv.className = styleClasses;
                dayDiv.onclick = () => selectDate(day);

                let numberColor = isSelected ? 'text-white' : (dayOfWeek === 0 ? 'text-pop-pink' : 'text-[#2696E4]');
                let htmlContent = `<span class="text-xs md:text-sm font-extrabold ${numberColor}">${day}</span>`;

                if (eventsToday.length > 0) {
                    htmlContent += `<div class="mt-1 flex flex-col gap-0.5 w-full">`;
                    eventsToday.forEach(event => {
                        let badgeClass = "bg-pop-pink text-white border-pop-pink";
                        let iconHtml = "";
                        if (event.type === 'school') badgeClass = "bg-pop-teal text-white border-pop-teal";
                        if (event.type === 'promo') { badgeClass = "bg-pop-orange text-white"; iconHtml = `<i data-lucide="shopping-bag" class="w-2 h-2 inline mr-0.5"></i>`; }
                        if (event.type === 'regional') { badgeClass = "bg-white text-pop-purple border-pop-purple border font-bold"; iconHtml = `<i data-lucide="map-pin" class="w-2 h-2 inline mr-0.5"></i>`; }
                        
                        htmlContent += `<div class="${badgeClass} text-[8px] md:text-[9px] leading-tight px-1 py-0.5 rounded-sm md:rounded-md truncate w-full shadow-sm font-semibold" title="${event.name}">${iconHtml}${event.name}</div>`;
                    });
                    htmlContent += `</div>`;
                }

                let shortIdeaText = eventsToday.length > 0 ? generateContentIdea(eventsToday[0]).topic : dailyIdeas[dayOfWeek].topic;
                let ideaLabelColor = isSelected ? 'text-[#FFEA86]' : 'text-[#00ACDF]';
                let ideaTextColor = isSelected ? 'text-white' : 'text-pop-dark/80';
                
                htmlContent += `
                    <div class="mt-auto pt-1 w-full">
                        <div class="text-[7px] md:text-[8px] ${ideaLabelColor} font-bold uppercase tracking-wider border-t ${isSelected ? 'border-white/20' : 'border-[#D4F6FF]/50'} pt-1 truncate w-full flex items-center gap-1">
                            <i data-lucide="lightbulb" class="w-2 h-2"></i> Ide Konten:
                        </div>
                        <div class="text-[8px] md:text-[9px] ${ideaTextColor} font-semibold truncate w-full leading-tight mt-0.5">${shortIdeaText}</div>
                    </div>
                `;

                dayDiv.innerHTML = htmlContent;
                grid.appendChild(dayDiv);
            }
        }

        function renderDetails() {
            const panel = document.getElementById('detailsPanel');
            
            if (!selectedDate) {
                panel.innerHTML = `
                    <div class="flex-1 flex flex-col items-center justify-center h-full bg-white rounded-2xl border border-dashed border-[#00ACDF]/30">
                        <div class="bg-[#D4F6FF] p-4 rounded-full mb-4 animate-bounce">
                            <i data-lucide="mouse-pointer-click" class="w-8 h-8 text-[#2696E4]"></i>
                        </div>
                        <p class="text-base font-bold text-pop-dark text-center px-4">Pilih Tanggal</p>
                        <p class="text-xs text-pop-dark/60 text-center px-4 mt-2">Klik salah satu tanggal di kalender<br>untuk melihat inspirasi konten.</p>
                    </div>
                `;
                return;
            }

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const dayDate = new Date(year, month, selectedDate);
            const dayOfWeek = dayDate.getDay();
            const fullDateString = `${dailyIdeas[dayOfWeek].dayName}, ${selectedDate} ${MONTHS[month]} ${year}`;

            const eventsToday = allEvents.filter(e => e.month === month && e.date === selectedDate);
            const routineIdea = dailyIdeas[dayOfWeek];

            let htmlContent = `
                <div class="shrink-0 flex items-center gap-3 mb-4 pb-3 border-b border-gray-100">
                    <div class="bg-gradient-to-br from-[#2696E4] to-[#00ACDF] text-white p-2.5 rounded-2xl shadow-lg shadow-[#2696E4]/20">
                        <i data-lucide="calendar-star" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <h2 class="text-base md:text-lg font-extrabold text-pop-dark leading-tight">${fullDateString}</h2>
                        <div class="flex items-center gap-2 mt-1">
                            ${eventsToday.length > 0 
                                ? `<span class="bg-[#FFEA86]/80 text-[#1E293B] px-2 py-0.5 rounded-md text-[9px] md:text-[10px] font-bold flex items-center gap-1 border border-[#FFEA86]"><i data-lucide="flame" class="w-3 h-3"></i> ${eventsToday.length} Event Spesial</span>` 
                                : `<span class="bg-[#D4F6FF]/60 text-[#2696E4] px-2 py-0.5 rounded-md text-[9px] md:text-[10px] font-bold flex items-center gap-1 border border-[#00ACDF]/20"><i data-lucide="coffee" class="w-3 h-3"></i> Konten Rutin</span>`}
                        </div>
                    </div>
                </div>

                <div class="shrink-0 mb-4 bg-[#D4F6FF]/20 p-3 rounded-2xl border border-[#00ACDF]/20 flex flex-col gap-2">
                    <div class="flex items-center gap-1.5 text-xs font-bold text-[#2696E4]">
                        <i data-lucide="settings-2" class="w-4 h-4"></i> Opsi Model Poster (AI Generator)
                    </div>
                    <div class="flex flex-col md:flex-row gap-2">
                        <div class="flex-1">
                            <label class="text-[9px] font-bold text-pop-dark/60 mb-1 block uppercase tracking-wider">Ukuran:</label>
                            <select id="arSelect" onchange="updatePromptSettings()" class="w-full text-[10px] md:text-xs bg-white border border-[#D4F6FF] text-pop-dark font-medium rounded-lg px-2 py-1.5 outline-none focus:border-[#2696E4] shadow-sm transition-all cursor-pointer">
                                <option value="4:5" ${currentAR === '4:5' ? 'selected' : ''}>Portrait IG (4:5)</option>
                                <option value="1:1" ${currentAR === '1:1' ? 'selected' : ''}>Persegi (1:1)</option>
                                <option value="9:16" ${currentAR === '9:16' ? 'selected' : ''}>Story/Tiktok (9:16)</option>
                                <option value="16:9" ${currentAR === '16:9' ? 'selected' : ''}>Banner (16:9)</option>
                            </select>
                        </div>
                        <div class="flex-1">
                            <label class="text-[9px] font-bold text-pop-dark/60 mb-1 block uppercase tracking-wider">Gaya:</label>
                            <select id="styleSelect" onchange="updatePromptSettings()" class="w-full text-[10px] md:text-xs bg-white border border-[#D4F6FF] text-pop-dark font-medium rounded-lg px-2 py-1.5 outline-none focus:border-[#2696E4] shadow-sm transition-all cursor-pointer">
                                <option value="fotografi produk estetik dan tajam" ${currentStyle.includes('fotografi') ? 'selected' : ''}>Fotografi Produk</option>
                                <option value="3D render bergaya modern yang memukau" ${currentStyle.includes('3D') ? 'selected' : ''}>3D Render Modern</option>
                                <option value="ilustrasi flat design minimalis dan rapi" ${currentStyle.includes('ilustrasi') ? 'selected' : ''}>Ilustrasi Minimalis</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <div class="flex-1 overflow-y-auto pr-1 md:pr-2 space-y-4 custom-scroll pb-2">
            `;

            if (eventsToday.length > 0) {
                eventsToday.forEach(event => {
                    const idea = generateContentIdea(event);
                    let badgeStyles = "bg-pop-pink text-white";
                    let icon = "star";
                    if(event.type === 'school') { badgeStyles = "bg-pop-teal text-white"; icon = "graduation-cap"; }
                    if(event.type === 'promo') { badgeStyles = "bg-pop-orange text-white"; icon = "shopping-bag"; }
                    if(event.type === 'regional') { badgeStyles = "bg-white text-pop-purple border border-pop-purple"; icon = "map-pin"; }

                    htmlContent += buildContentCard(idea, `Spesial: ${event.name}`, badgeStyles, icon, true);
                });
                
                htmlContent += `
                    <div class="flex items-center gap-3 py-1">
                        <div class="h-px bg-[#D4F6FF] flex-1"></div>
                        <span class="text-[10px] font-bold text-[#00ACDF]/60 uppercase tracking-widest">Atau</span>
                        <div class="h-px bg-[#D4F6FF] flex-1"></div>
                    </div>
                `;
            }

            htmlContent += buildContentCard(routineIdea, "Ide Rutin Harian", "bg-[#FFF8DB] text-[#2696E4] border border-[#2696E4]/20", "clock", false);

            htmlContent += `</div>`;
            panel.innerHTML = htmlContent;
        }

        function buildContentCard(data, label, badgeClass, icon, isEvent) {
            const promptId = `prompt-${Math.random().toString(36).substr(2, 9)}`;
            
            const role = "Bertindaklah sebagai desainer grafis profesional dan ahli marketing media sosial.";
            const task = `Buatkan gambar latar untuk desain poster/flyer promosi alat tulis dengan topik: "${data.topic}".`;
            const audience = "Target audiens: Pelajar, mahasiswa, guru, dan pekerja kantoran.";
            const visual = `Gaya visual: ${currentStyle}. Aturan Desain: WAJIB buatkan tata letak tipografi bersih dengan area kosong (copy space) yang luas untuk menaruh Judul Besar dan tebal (bold headline), serta ruang untuk teks bullet points. Visual harus berkualitas tinggi, tajam, komposisi bersih dan tidak menumpuk. Warna & Branding: WAJIB menggunakan palet warna brand secara ketat dengan kontras tinggi agar elemen penting menonjol: Cyan Blue (#00ACDF), Pale Cyan (#D4F6FF), Royal Blue (#2696E4), Yellow (#FFEA86), dan Pale Yellow (#FFF8DB).`;
            const keyInfo = `Detail elemen gambar: ${data.basePrompt} ATURAN TEKS DALAM GAMBAR: Jika AI menghasilkan teks, tipografi, atau tulisan di dalam visual, teks tersebut WAJIB 100% menggunakan Bahasa Indonesia dengan ejaan yang benar (TIDAK BOLEH menggunakan bahasa Inggris). Format gambar: Resolusi 8k --ar ${currentAR}.`;

            const finalPromptText = `[Role] ${role}\n[Task] ${task}\n[Audience] ${audience}\n[Visual/Tone] ${visual}\n[Key Info] ${keyInfo}`;

            const cardBg = isEvent ? 'bg-white' : 'bg-[#D4F6FF]/10';
            const cardBorder = isEvent ? 'border-[#00ACDF]/30 shadow-md shadow-[#00ACDF]/5' : 'border-[#00ACDF]/10';
            const highlightColor = isEvent ? 'bg-gradient-to-b from-[#2696E4] to-[#00ACDF]' : 'bg-[#FFEA86]';

            return `
                <div class="${cardBg} border ${cardBorder} rounded-2xl p-4 relative overflow-hidden group hover:border-[#2696E4]/50 transition-colors">
                    <div class="absolute top-0 left-0 w-1 h-full ${highlightColor}"></div>
                    
                    <span class="inline-flex items-center gap-1 px-2.5 py-1 rounded-md text-[10px] font-bold mb-3 shadow-sm ${badgeClass}">
                        <i data-lucide="${icon}" class="w-3 h-3"></i> ${label}
                    </span>
                    
                    <h3 class="text-base font-extrabold text-pop-dark mb-1.5">${data.topic}</h3>
                    
                    <p class="text-xs font-semibold text-[#2696E4] mb-3 flex items-center gap-1.5 bg-[#D4F6FF]/40 inline-flex px-2.5 py-1 rounded-md border border-[#00ACDF]/10">
                        <i data-lucide="layout-template" class="w-3.5 h-3.5"></i> ${data.format}
                    </p>
                    
                    <div class="bg-white p-3 rounded-xl border border-gray-100 shadow-sm mb-3">
                        <p class="text-xs text-pop-dark/80 leading-relaxed">${data.description}</p>
                    </div>

                    <div class="bg-[#1E293B] rounded-xl overflow-hidden shadow-md mt-2">
                        <div class="bg-gray-800 px-3 py-2 flex justify-between items-center border-b border-gray-700">
                            <span class="text-[10px] font-bold text-[#FFEA86] flex items-center gap-1.5">
                                <i data-lucide="sparkles" class="w-3 h-3"></i> Prompt AI Gambar
                            </span>
                            <button onclick="copyToClipboard('${promptId}', this)" class="text-gray-400 hover:text-white bg-gray-700 hover:bg-[#2696E4] px-2.5 py-1 flex items-center gap-1.5 text-[10px] font-bold transition-all rounded-md shadow-sm">
                                <i data-lucide="copy" class="w-3 h-3"></i> <span class="btn-text">Copy</span>
                            </button>
                        </div>
                        <div class="p-3 relative bg-gray-900">
                            <p class="text-[10px] text-gray-300 font-mono leading-relaxed whitespace-pre-wrap" id="${promptId}">${finalPromptText}</p>
                        </div>
                    </div>
                </div>
            `;
        }

        async function copyToClipboard(elementId, btnElement) {
            const textElement = document.getElementById(elementId);
            const text = textElement.innerText || textElement.textContent;
            
            const showSuccess = () => {
                const originalHtml = btnElement.innerHTML;
                btnElement.classList.replace('bg-gray-700', 'bg-[#14B8A6]');
                btnElement.classList.replace('hover:bg-[#2696E4]', 'hover:bg-[#14B8A6]');
                btnElement.classList.replace('text-gray-400', 'text-white');
                btnElement.innerHTML = `<i data-lucide="check" class="w-3 h-3"></i> <span>Copied!</span>`;
                lucide.createIcons();
                setTimeout(() => {
                    btnElement.innerHTML = originalHtml;
                    btnElement.classList.replace('bg-[#14B8A6]', 'bg-gray-700');
                    btnElement.classList.replace('hover:bg-[#14B8A6]', 'hover:bg-[#2696E4]');
                    btnElement.classList.replace('text-white', 'text-gray-400');
                    lucide.createIcons();
                }, 2000);
            };

            try {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(text);
                    showSuccess();
                    return;
                }
                throw new Error("API not ready");
            } catch (err) {
                const textArea = document.createElement("textarea");
                textArea.value = text;
                textArea.style.position = "fixed";
                textArea.style.top = "0";
                textArea.style.left = "0";
                textArea.style.opacity = "0";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    document.execCommand('copy');
                    showSuccess();
                } catch (e) {
                    console.error('Copy failed');
                }
                document.body.removeChild(textArea);
            }
        }

        function openModal(type) {
            const modal = document.getElementById('eventModal');
            const titleBox = document.getElementById('modalTitle');
            const bodyBox = document.getElementById('modalBody');
            
            let filteredEvents = allEvents.filter(e => e.type === type);
            let titleText = "";
            let titleIcon = "";

            if (type === 'holiday') { titleText = "Libur Nasional"; titleIcon = "calendar"; }
            if (type === 'school') { titleText = "Momen Sekolah"; titleIcon = "graduation-cap"; }
            if (type === 'promo') { titleText = "Promo Kembar"; titleIcon = "shopping-bag"; }
            if (type === 'regional') { titleText = "Hari Raya Lokal (Bali)"; titleIcon = "map-pin"; }

            titleBox.innerHTML = `<i data-lucide="${titleIcon}" class="w-4 h-4 text-white/90"></i> ${titleText}`;

            if (filteredEvents.length === 0) {
                bodyBox.innerHTML = "<p class='text-center text-gray-500 py-6 text-sm font-medium'>Tidak ada data.</p>";
            } else {
                let listHtml = `<div class="space-y-2">`;
                filteredEvents.forEach(e => {
                    listHtml += `
                        <div class="flex justify-between items-center p-3 bg-white border border-[#D4F6FF] rounded-xl hover:border-[#2696E4]/50 hover:shadow-md transition-all group">
                            <div>
                                <p class="font-bold text-pop-dark text-sm group-hover:text-[#2696E4] transition-colors">${e.name}</p>
                                <p class="text-[10px] font-semibold text-gray-400 mt-0.5 flex items-center gap-1"><i data-lucide="calendar-days" class="w-3 h-3"></i> ${e.date} ${MONTHS[e.month]}</p>
                            </div>
                            <button onclick="jumpToDate(${e.month}, ${e.date})" class="bg-[#FFF8DB] text-[#2696E4] border border-[#FFEA86] hover:bg-[#2696E4] hover:border-[#2696E4] hover:text-white text-[10px] font-bold px-3 py-1.5 rounded-lg transition-all shadow-sm">
                                Lihat
                            </button>
                        </div>
                    `;
                });
                listHtml += `</div>`;
                bodyBox.innerHTML = listHtml;
            }

            modal.classList.remove('opacity-0', 'pointer-events-none');
            document.getElementById('modalContentBox').classList.remove('scale-95');
            document.getElementById('modalContentBox').classList.add('scale-100');
            lucide.createIcons();
        }

        function closeModal() {
            const modal = document.getElementById('eventModal');
            modal.classList.add('opacity-0', 'pointer-events-none');
            document.getElementById('modalContentBox').classList.remove('scale-100');
            document.getElementById('modalContentBox').classList.add('scale-95');
        }

        function jumpToDate(month, date) {
            currentDate.setMonth(month);
            selectedDate = date;
            
            closeModal();
            
            setTimeout(() => {
                renderCalendar();
                renderDetails();
                lucide.createIcons();
            }, 200);
        }

        window.onload = initCalendar;
    </script>
</body>
</html>
